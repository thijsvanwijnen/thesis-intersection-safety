version: 1.0
version_name: Albatros

survey:
  name: "similarity_judgment_example"
  title: "Similarity Judgment for House Preferences"
  subtitle: "A study on consumer preferences for residential properties"
  logo: assets/user_logo.png
  color: "#2E8B57"
  
  sections:
    onboarding:
      home:
        content: |
          ## Welcome to the Similarity Judgment Study! 🏡
          
          ### About this example
          This is a demonstration of a similarity judgment experiment designed with PixelSurvey. Our example develop a similarity judgment experiment, where the instances are rooms presented as images. The experiment is based on a custom design located in the `assets/exp1/sj_custom_design.csv`.

          ### Survey structure
          - Homepage (this page)
          - Informed Consent
          - Participant Screening (three questions)
          - An Similarity Judgment Experiment activity with 8 similarity tasks  
          - A questionnaire with 4 questions about housing preferences and habits
          - Thank you page

          ### How to start building your own survey
          1. I suggest modifying the content of this survey to be familiar with the structure and YAML format.
          2. Then, you can start building your own survey by changing the content and structure.
          3. Remember that PixelSurvey just read an experiment design file, so you can create your own custom design with any software (e.g., Ngene, Excel, etc.) and upload it to the `assets` folder. Then, you just need to specify the path to your custom design in the `custom_design` field of the experiment activity.

          I hope this example helps you to get started with PixelSurvey and to design your own experiments and surveys. If you have any questions or need further assistance, feel free to reach out!

      consent:
        content: |
          ## Informed Consent

          Here you should type the informed consent statement for your study. This is a relevant part of any research involving human participants, as it ensures that they are fully aware of the nature of the study, the potential risks and benefits, and their rights as participants.

          ##### Thank you for your participation!
          PixelSurvey Team,
          TU Delft

        consent_statement: "I am older than 18 and I consent to participate in this study"

      screening:
        content: |
          ## Participant Screening
          
          Please answer the following questions to determine your eligibility for this study.
          
        questions:
          - id: 1
            type: multiple_choice
            order: 1
            question: "What is your age group?"
            alternatives:
              - "18-30"
              - "31-45"
              - "46-60"
              - "Over 60"
            required: true
            variable_name: age_group

          - id: 2
            type: multiple_choice
            order: 2
            question: "What is your gender?"
            alternatives:
              - "Male"
              - "Female"
              - "Other"
            required: true
            variable_name: gender

          - id: 3
            type: multiple_choice
            order: 3
            question: "Which continent do you currently live in?"
            alternatives:
              - "North America"
              - "South America"
              - "Europe"
              - "Asia"
              - "Africa"
              - "Oceania"
            required: true
            variable_name: continent

        quotas:
          method: uniform
          limit: 3
          fullquota_content: |
            ## Thank you for your interest
            However, you are not eligible for continuing replying this survey

    body:
      instructions:
        content: |
          ## Study Instructions
          
          You will now complete 1 **Similarity Judgment** activity related to housing preferences. Then, you have to replied some questions related to your housing preferences. Please read the instructions carefully for each section.

          For the activity you have to imagine that you are in the market for a new home and you are evaluating different properties based on their characteristics. In each choice task, you will be presented with two properties and you will have to choose which one you prefer based on the information provided. The properties will be described by an image and a price.
    

      activity_1:
        order: 1
        type: experiment
        experiment_type: similarity_judgment
        persistent_instructions: |
          ### Property Similarity Task - Custom Design
          
          Look at the property image and compare it with others in your mind.
          
        task:
          query: "Which property is the odd one out?"
          instance: "Property"
          images_per_instance: 1
        settings:
          tasks_per_respondent: 8
          experimental_design_mode: custom
          custom_design: experiments/exp1/sj_custom_design.csv    
          

      activity_2:
        order: 2
        type: questionnaire
        persistent_instructions: |
          ### Background Questions

          Please answer the following questions about your housing preferences and living situation.

        questions:
          - id: 1
            type: multiple_choice
            order: 1
            question: "What is your household's socioeconomic status?"
            alternatives:
              - "Low income (Under $25,000)"
              - "Lower-middle income ($25,000-$49,999)"
              - "Middle income ($50,000-$74,999)"
              - "Upper-middle income ($75,000-$99,999)"
              - "High income ($100,000+)"
              - "Prefer not to say"
            required: true
            variable_name: socioeconomic_status

          - id: 2
            type: multiple_choice
            order: 2
            question: "What is your preferred property type?"
            alternatives:
              - "Single-family house"
              - "Apartment/Condo"
              - "Townhouse"
              - "Duplex"
              - "Mobile home"
              - "Other"
            required: true
            variable_name: preferred_property_type

          - id: 3
            type: multiple_choice
            order: 3
            question: "How often do you move to a new residence?"
            alternatives:
              - "Every year"
              - "Every 2-3 years"
              - "Every 4-5 years"
              - "Every 6-10 years"
              - "Rarely (10+ years)"
              - "Never moved"
            required: false
            variable_name: moving_frequency

          - id: 4
            type: open_text
            order: 4
            question: "Please share your opinion about the most important factors when choosing a home. What influences your housing decisions the most?"
            required: true
            variable_name: housing_opinion

    closure:
      end:
        content: |
          ## Thank You! 🎉
          
          ### Study Complete
          Thank you for participating in our Home Preferences Study and for using PixelSurvey!