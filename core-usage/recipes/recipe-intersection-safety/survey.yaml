version: '1.0'
version_name: Albatros
survey:
  name: Kruispuntveiligheidsonderzoek
  title: Visuele veiligheidsbeoordeling van Rotterdamse kruispunten
  subtitle: Expertbeoordeling via paarsgewijze vergelijking — TU Delft / Gemeente
    Rotterdam
  logo: assets/tudelft_logo.png
  color: '#00A6D6'
  sections:
    onboarding:
      home:
        content: '# Welkom

          U neemt deel aan een expertonderzoek van **TU Delft** en **Gemeente Rotterdam**
          over visuele veiligheidsbeoordeling van Rotterdamse kruispunten.

          - Duurt ongeveer **20 minuten**

          - U beoordeelt **40 kruispuntparen**

          - Geen goede of foute antwoorden — uw professionele oordeel staat centraal

          - Klik op **Start onderzoek** om verder te gaan.

          '
      consent:
        content: '# Geïnformeerde toestemming


          ## Doel

          Het doel van dit onderzoek is te bepalen of door experts beoordeelde visuele
          veiligheidsinformatie crashvoorspellingsmodellen voor stedelijke kruispunten
          kan verbeteren. Uw deelname helpt professionele verkeerskundige kennis om
          te zetten in een kwantitatief model.


          ## Wat wordt er van u gevraagd

          - Paren straatfoto''s van Rotterdamse kruispunten bekijken

          - Aangeven welk kruispunt er veiliger uitziet

          - Enkele verplichte screeningsvragen beantwoorden over uw professionele
          achtergrond

          - Na de beoordelingstaak aanvullende achtergrondvragen beantwoorden

          ## Gegevensverwerking

          - Alle antwoorden worden veilig opgeslagen op een TU Delft-server

          - Gegevens worden anoniem verwerkt; individuele scores worden niet gerapporteerd

          - Geagregeerde resultaten kunnen worden gepubliceerd in een academische
          scriptie en gerelateerde artikelen

          - U kunt zich op elk moment zonder consequenties terugtrekken


          ## Contact

          Voor vragen over dit onderzoek kunt u contact opnemen met:

          **Thijs van Wijnen** — gvanwijnen@student.tudelft.nl

          — TU Delft, Faculteit Technologie, Beleid en Management

          '
        consent_statement: Ik heb de bovenstaande informatie gelezen, ik begrijp wat
          deelname inhoudt, en ik stem in met deelname aan dit onderzoek
      screening:
        content: '# Screeningsvragen


          Beantwoord de onderstaande vragen. Alleen deelnemers met een professionele
          achtergrond in verkeerskunde of verkeersveiligheidsontwerp komen in aanmerking
          voor dit onderzoek.

          '
        questions:
        - id: 1
          type: multiple_choice
          order: 1
          question: Wat omschrijft uw huidige professionele rol het beste?
          alternatives:
          - Verkeerskundig ingenieur / wegontwerper
          - Verkeersveiligheidsspecialist / -auditor
          - Stedenbouwkundige (met focus op verkeersveiligheid)
          - Beleidsadviseur (zonder technische achtergrond)
          - Verkeersveiligheidsadviseur
          - Anders
          required: true
          variable_name: professional_role
        - id: 2
          type: multiple_choice
          order: 2
          question: Voor welke organisatie werkt u momenteel?
          alternatives:
          - Gemeente Rotterdam
          - Andere gemeente
          - Provincie
          - Rijkswaterstaat
          - Ingenieursbureau
          - Kennisinstituut / universiteit
          - Wil ik niet zeggen
          required: true
          variable_name: years_experience
        - id: 3
          type: multiple_choice
          order: 3
          question: Hoeveel jaar professionele ervaring heeft u in verkeersveiligheid
            of wegontwerp?
          alternatives:
          - Minder dan 2 jaar
          - 2–5 jaar
          - 6–10 jaar
          - Meer dan 10 jaar
          required: true
          variable_name: intersection_assessment_experience
        quotas:
          method: no_limit
          fullquota_content: '# Bedankt voor uw interesse


            Helaas is dit onderzoek voorbehouden aan professionals met een achtergrond
            in

            verkeerskunde of verkeersveiligheidsontwerp. Uw profiel voldoet niet aan
            de

            deelnamecriteria voor dit specifieke onderzoek.


            Hartelijk dank voor uw tijd.

            '
    body:
      instructions:
        content: "# Taakinstructies\n\n\n## Wat u gaat doen\n\nU krijgt een reeks\
          \ kruispuntparen te zien, elk weergegeven door één\nstraatfoto. Geef bij\
          \ elk paar aan **bij welk kruispunt de kans hoger\nis dat een auto betrokken\
          \ raakt bij een letsel- of dodelijk\nverkeersongeval**.\n\nBeschouw zowel\
          \ enkelvoudige ongevallen (zoals controleverlies) als\nbotsingen op de rijbaan\
          \ waarbij minstens één motorvoertuig betrokken is (inclusief met fietsers,\
          \ voetgangers of andere weggebruikers). Puur materiële\nschade telt niet\
          \ mee.\n\n\n## Hoe te beoordelen\n\nGa bij uw beoordeling uit van normaal,\
          \ regelconform rijgedrag — het gaat om de inherente veiligheid van de inrichting,\
          \ niet om incidenteel afwijkend gedrag van weggebruikers.\n\nBaseer uw beoordeling\
          \ uitsluitend op wat zichtbaar is in de foto. Eventuele voorkennis over\
          \ de locatie of het kruispunt telt niet mee.\n\nDe verkeersintensiteitklasse\
          \ wordt ter referentie getoond en betreft de tak die\nzichtbaar is in de\
          \ foto. Gebruik deze om te beoordelen of de zichtbare\ninrichting passend\
          \ is bij de belasting, niet als directe risicomaatstaf.\n\n| Klasse | Drempelwaarde\
          \ |\n|---|---|\n| Laag | < 1.000 voertuigen/dag |\n| Middelmatig | 1.000\
          \ – 6.000 voertuigen/dag |\n| Hoog | > 6.000 voertuigen/dag |\n\nLet daarbij\
          \ op de algehele indruk van de inrichting:\n\n- Hoe duidelijk communiceert\
          \ de lay-out de voorrangsrelaties?\n\n- Hoe adequaat zijn de zichtlijnen?\n\
          \n- Hoe voorspelbaar is het verwachte gedrag van weggebruikers? \n\n- U\
          \ hoeft geen afzonderlijke kenmerken te scoren of uw keuze toe te lichten.\
          \ \n\n- Reageer op basis van uw eerste professionele indruk.\n\n\n## Praktische\
          \ opmerkingen\n\n- Er is geen gelijkspeloptie: kies altijd het kruispunt\
          \ dat u risicovoller acht, ook als het verschil klein lijkt.\n\n- U kunt\
          \ korte pauzes nemen tussen de vergelijkingen\n\n\n\n**Klik op Doorgaan\
          \ als u klaar bent om te beginnen.**\n"
      activity_1:
        order: 1
        type: experiment
        experiment_type: stated_choice
        persistent_instructions: '## Paarsgewijze veiligheidsvergelijking

          Baseer uw oordeel op het zichtbare ontwerp.

          '
        task:
          query: Bij welk kruispunt is de kans op een ernstig verkeersongeval op de
            rijbaan (letsel of dodelijk) hoger?
          instance: Kruispunt
          n_alternatives: 2
          attributes:
          - label: Straatbeeld
            type: image
            unit: url
          - label: Verkeersintensiteit
            type: standard
            unit: aantal voertuigen per dag
        settings:
          tasks_per_respondent: 36
          experimental_design_mode: custom
          custom_design: experiments/pairwise_design.csv
      activity_2:
        order: 2
        type: questionnaire
        persistent_instructions: '## Achtergrondvragen


          Tot slot enkele vragen over uw professionele achtergrond.

          Deze informatie wordt gebruikt om het expertpanel te karakteriseren en wordt
          niet

          gekoppeld aan uw individuele vergelijkingsantwoorden.

          '
        questions:
        - id: 1
          type: multiple_choice
          order: 1
          question: Hoe vaak voert u locatie-inspecties of veiligheidsaudits uit bij
            kruispunten?
          alternatives:
          - Wekelijks of vaker
          - Maandelijks
          - Een paar keer per jaar
          - Zelden
          required: true
          variable_name: inspection_frequency
        - id: 2
          type: multiple_choice
          order: 2
          question: Hoe bekend bent u met de ontwerpprincipes van Duurzaam Veilig?
          alternatives:
          - Zeer bekend — ik pas ze regelmatig toe
          - Bekend — ik ken de hoofdprincipes
          - Enigszins bekend
          - Niet bekend
          required: true
          variable_name: sustainable_safety_familiarity
        - id: 3
          type: open_text
          order: 3
          question: Heeft u opmerkingen over de beoordelingstaak of de kruispuntfoto's
            die u aan de onderzoeker wilt doorgeven? (optioneel)
          required: false
          variable_name: open_feedback
    closure:
      end:
        content: '# Bedankt voor uw deelname


          ## Uw bijdrage

          U heeft de paarsgewijze vergelijkingssessie voltooid. Uw expertbeoordelingen

          vormen de basis van dit onderzoek en worden zeer gewaardeerd.


          ## Wat er verder gebeurt

          Uw antwoorden worden gebruikt om een continue veiligheidsscore per kruispunt
          te schatten via een Bradley-Terry-model. Vervolgens wordt onderzocht of
          het toevoegen van deze scores een meerwaarde heeft voor crashvoorspellingsmodellen
          voor Rotterdam.


          ## Resultaten

          Als u een samenvatting van de onderzoeksresultaten wilt ontvangen zodra
          de scriptie

          is afgerond, stuur dan een e-mail naar:

          **gvanwijnen@student.tudelft.nl**


          ## Vragen

          Voor vragen over dit onderzoek kunt u contact opnemen met de onderzoeker
          gvanwijnen@tudelft.nl.


          **Hartelijk dank voor uw waardevolle bijdrage.**

          '
