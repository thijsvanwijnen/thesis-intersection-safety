services:
  - type: web
    name: pixelsurvey-intersection-safety
    runtime: python
    # requirements.txt staat in de root van de repo (= core-usage/)
    buildCommand: pip install -r requirements.txt
    # Python voegt de map van app.py automatisch toe aan sys.path,
    # waardoor 'from database import Database' in de pages werkt
    startCommand: cd surveys/survey-intersection-safety && python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
